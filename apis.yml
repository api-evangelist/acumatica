aid: acumatica
name: Acumatica
description: >
  Acumatica is a cloud ERP platform with a contract-based REST API for managing
  financial data, inventory, projects, manufacturing, distribution, and business
  management workflows. The API exposes over 200 default endpoints covering
  financial management, order management, inventory, purchasing, project accounting,
  and CRM modules. Endpoints are versioned by release (e.g., 24.200.001 for 2024 R2)
  and authenticate via OAuth 2.0 or cookie-based sessions.
