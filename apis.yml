    name: Acumatica REST API
    description: >
      Contract-based REST API for Acumatica ERP providing programmatic access to
      financial management, order management, inventory, purchasing, project
      accounting, CRM, and manufacturing modules. Over 200 default endpoints expose
      business objects rather than screen fields, ensuring integrations survive
      UI customizations. API versions correspond to Acumatica ERP releases.
